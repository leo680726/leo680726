<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品詳情 | 貓咪的甜點日常</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><a href="index.html" style="text-decoration: none; color: inherit;">🐈 貓咪的甜點日常</a></h1>
    </header>

    <main class="detail-container" id="detail-content">
        <div style="text-align: center; padding: 100px 20px;">
            <p>🐾 貓咪正在為您尋找美味的蛋糕...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 取得網址列上的參數 (例如 ?id=cake-01)
            const urlParams = new URLSearchParams(window.location.search);
            const cakeId = urlParams.get('id');

            const container = document.getElementById('detail-content');

            // 如果網址沒有 ID，請他回首頁
            if (!cakeId) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px;">
                        <p>找不到此作品，請回首頁🐾</p>
                        <button onclick="window.location.href='index.html'">回首頁</button>
                    </div>`;
                return;
            }

            // 2. 讀取 JSON 資料檔
            fetch('portfolio.json')
                .then(response => response.json())
                .then(data => {
                    // 3. 在資料中尋找符合這個 ID 的蛋糕
                    const cake = data.find(item => item.id === cakeId);
                    
                    if (cake) {
                        // 4. 把找到的蛋糕資料，填入精心設計的內頁排版中
                        container.innerHTML = `
                            <div class="breadcrumb">
                                <a href="index.html">🏠 首頁</a> > <span>${cake.category}</span>
                            </div>
                            
                            <div class="detail-card">
                                <div class="detail-img-box">
                                    <img src="${cake.image}" alt="${cake.title}">
                                </div>
                                <div class="detail-text">
                                    <h2>${cake.title}</h2>
                                    <div class="detail-meta">
                                        📅 製作日期：${cake.date} | 🏷️ ${cake.category}
                                    </div>
                                    <hr>
                                    <div class="detail-desc">
                                        ${cake.content} 
                                    </div>
                                    <button onclick="window.location.href='index.html'" class="back-btn">🐾 回到作品集</button>
                                </div>
                            </div>
                        `;
                    } else {
                        container.innerHTML = '<p style="text-align:center; padding: 50px;">作品不存在，可能被貓咪偷吃了 😿</p>';
                    }
                })
                .catch(error => {
                    console.error('載入失敗:', error);
                    container.innerHTML = '<p style="text-align:center; padding: 50px;">資料連線異常 😿</p>';
                });
        });
    </script>
</body>
</html>
