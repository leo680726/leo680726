<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品詳情 | 貓咪的甜點日常</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><a href="index.html" style="text-decoration: none; color: inherit;">🐈 貓咪的甜點日常</a></h1>
    </header>

    <main class="detail-container" id="detail-content">
        <div style="text-align: center; padding: 100px 20px;">
            <p>🐾 貓咪正在為您尋找美味的蛋糕...</p>
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cakeId = urlParams.get('id');
            const container = document.getElementById('detail-content');

            if (!cakeId) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px;">
                        <p>找不到此作品，請回首頁🐾</p>
                        <button onclick="window.location.href='index.html'">回首頁</button>
                    </div>`;
                return;
            }

            fetch('portfolio.json')
                .then(response => response.json())
                .then(data => {
                    const cake = data.find(item => item.id === cakeId);
                    
                    if (cake) {
                        container.innerHTML = `
                            <div class="breadcrumb">
                                <a href="index.html">🏠 首頁</a> > <span>${cake.category}</span>
                            </div>
                            
                            <div class="detail-card">
                                <div class="detail-img-box">
                                    <img src="${cake.image}" alt="${cake.title}" 
                                         onclick="openLightbox(this.src)" 
                                         style="cursor: zoom-in;" title="點擊放大圖片">

                                    <div class="zoom-hint">🔍 點圖可放大</div>
                                </div>
                                <div class="detail-text">
                                    <h2>${cake.title}</h2>
                                    <div class="detail-meta">
                                        📅 製作日期：${cake.date} | 🏷️ ${cake.category}
                                    </div>
                                    <hr>
                                    <div class="detail-desc">
                                        ${cake.content} 
                                    </div>
                                    <button onclick="window.location.href='index.html'" class="back-btn">🐾 回到作品集</button>
                                </div>
                            </div>
                        `;

                        /* 如果未來你的 JSON 的 content 裡面也有圖片想放大，可以加上這段 (選用) */
                        setTimeout(() => {
                            const descImages = document.querySelectorAll('.detail-desc img');
                            descImages.forEach(img => {
                                img.style.cursor = 'zoom-in';
                                img.title = '點擊放大圖片';
                                img.onclick = function() { openLightbox(this.src); };
                            });
                        }, 100);

                    } else {
                        container.innerHTML = '<p style="text-align:center; padding: 50px;">作品不存在，可能被貓咪偷吃了 😿</p>';
                    }
                })
                .catch(error => {
                    console.error('載入失敗:', error);
                    container.innerHTML = '<p style="text-align:center; padding: 50px;">資料連線異常 😿</p>';
                });
        });

        // =========================================
        // 新增：控制燈箱的 JavaScript 函數
        // =========================================
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageSrc;    // 把點擊的圖片網址塞進燈箱裡
            lightbox.classList.add('show'); // 加上 show 類別來顯示燈箱
            document.body.style.overflow = 'hidden'; // 防止背景網頁跟著滾動
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show'); // 移除 show 類別隱藏燈箱
            document.body.style.overflow = 'auto'; // 恢復背景網頁的滾動
        }
    </script>
</body>
</html>
</body>
</html>
